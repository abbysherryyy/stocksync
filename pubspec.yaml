name: stocksync_inventory
description: A Flutter inventory management application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database packages
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0  # For desktop support
  path: ^1.8.0

  # Storage for web/fallback
  shared_preferences: ^2.2.2

  # Internationalization and formatting - UPDATED VERSION
  intl: ^0.20.2  # Updated from ^0.19.0 to match Flutter SDK

  http: ^1.1.0
  mobile_scanner: ^3.5.7
  cached_network_image: ^3.3.0
  permission_handler: ^11.0.1
  share_plus: ^10.0.0

  image_picker: ^1.0.5  # For picking images from camera/gallery
  path_provider: ^2.1.1  # For saving images locally
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

